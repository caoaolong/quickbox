name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Create installer
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress

          $paths = @(
            "build\windows\x64\runner\Release",
            "build\windows\runner\Release"
          )
          $buildDir = $null
          foreach ($p in $paths) {
            if (Test-Path $p) {
              $buildDir = (Resolve-Path $p).Path
              break
            }
          }
          if (-not $buildDir) { Write-Error "Build output not found"; exit 1 }

          $version = "${{ github.ref_name }}" -replace '^v', ''

          $iss = @"
          [Setup]
          AppName=QuickBox
          AppVersion=$version
          DefaultDirName={autopf}\QuickBox
          DefaultGroupName=QuickBox
          UninstallDisplayIcon={app}\quickbox.exe
          OutputDir=installer-output
          OutputBaseFilename=QuickBox-Setup-$version
          Compression=lzma2
          SolidCompression=yes
          ArchitecturesInstallIn64BitMode=x64compatible
          [Files]
          Source: "$buildDir\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs
          [Icons]
          Name: "{group}\QuickBox"; Filename: "{app}\quickbox.exe"
          Name: "{group}\{cm:UninstallProgram,QuickBox}"; Filename: "{uninstallexe}"
          Name: "{commondesktop}\QuickBox"; Filename: "{app}\quickbox.exe"; Tasks: desktopicon
          [Tasks]
          Name: "desktopicon"; Description: "{cm:CreateDesktopIcon}"; GroupDescription: "{cm:AdditionalIcons}"; Flags: unchecked
          "@
          $iss | Out-File -FilePath setup.iss -Encoding ASCII
          & "C:\Program Files (x86)\Inno Setup 6\iscc.exe" setup.iss
      - uses: actions/upload-artifact@v4
        with:
          name: quickbox-windows
          path: installer-output/QuickBox-Setup-*.exe

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Create DMG
        run: |
          APP=$(find build/macos/Build/Products -name "*.app" -maxdepth 2 2>/dev/null | head -1)
          if [ -z "$APP" ]; then echo "macOS build output not found"; exit 1; fi
          echo "Found: $APP"
          version="${GITHUB_REF_NAME#v}"
          hdiutil create -volname "QuickBox" -srcfolder "$APP" -ov -format UDZO "QuickBox-$version.dmg"
      - uses: actions/upload-artifact@v4
        with:
          name: quickbox-macos
          path: QuickBox-*.dmg

  create-release:
    name: Create GitHub Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          cp quickbox-windows/*.exe release-assets/ 2>/dev/null || true
          cp quickbox-macos/*.dmg release-assets/ 2>/dev/null || true
          ls -la release-assets/
      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
