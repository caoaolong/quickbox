name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Package
        shell: pwsh
        run: |
          $paths = @(
            "build\windows\x64\runner\Release",
            "build\windows\runner\Release"
          )
          $found = $false
          foreach ($p in $paths) {
            if (Test-Path $p) {
              Write-Host "Packaging from: $p"
              Compress-Archive -Path "$p\*" -DestinationPath "quickbox-windows-${{ github.ref_name }}.zip"
              $found = $true
              break
            }
          }
          if (-not $found) {
            Write-Error "Windows build output not found"
            exit 1
          }
      - uses: actions/upload-artifact@v4
        with:
          name: quickbox-windows
          path: quickbox-windows-${{ github.ref_name }}.zip

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Package
        run: |
          if [ -d "build/macos/Build/Products/Release/Runner.app" ]; then
            ditto -c -k --keepParent build/macos/Build/Products/Release/Runner.app quickbox-macos-${{ github.ref_name }}.zip
          else
            echo "macOS build output not found"
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: quickbox-macos
          path: quickbox-macos-${{ github.ref_name }}.zip

  create-release:
    name: Create GitHub Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          cp quickbox-windows/*.zip release-assets/ 2>/dev/null || true
          cp quickbox-macos/*.zip release-assets/ 2>/dev/null || true
          ls -la release-assets/
      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
