name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter test

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Package
        shell: pwsh
        run: |
          $paths = @(
            "build\windows\x64\runner\Release",
            "build\windows\runner\Release"
          )
          $found = $false
          foreach ($p in $paths) {
            if (Test-Path $p) {
              Write-Host "Packaging from: $p"
              Compress-Archive -Path "$p\*" -DestinationPath quickbox-windows.zip
              $found = $true
              break
            }
          }
          if (-not $found) {
            Write-Error "Windows build output not found"
            exit 1
          }
      - uses: actions/upload-artifact@v4
        with:
          name: quickbox-windows
          path: quickbox-windows.zip

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Package
        run: |
          APP=$(find build/macos/Build/Products -name "*.app" -maxdepth 2 2>/dev/null | head -1)
          if [ -n "$APP" ]; then
            echo "Found: $APP"
            ditto -c -k --keepParent "$APP" quickbox-macos.zip
          else
            echo "macOS build output not found"
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: quickbox-macos
          path: quickbox-macos.zip
